services:
  - type: web
    name: mast-ai-assistant
    env: python
    buildCommand: "pip install -r requirements.render.txt"
    startCommand: "gunicorn app:app --timeout 120 --bind 0.0.0.0:${PORT}"
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: public_password
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
